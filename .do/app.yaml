# name: emp-shop
# Mẫu App Spec — sửa repo GitHub trước khi dùng (doctl hoặc Upload spec trên dashboard)
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: emp-shop
region: sgp

# Managed MySQL (Dev DB ~$7/tháng, Production cao hơn)
databases:
  - name: emp-db
    engine: MYSQL
    version: "8"

services:
  - name: emp-server
    environment_slug: node-js
    github:
      repo: levanvutru358/totnghiep
      branch: main
      deploy_on_push: true
    source_dir: emp.server
    build_command: npm install && npm run build
    run_command: npm run start:prod
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DB_HOST
        scope: RUN_TIME
        value: ${emp-db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${emp-db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${emp-db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: ${emp-db.PASSWORD}
      - key: DB_NAME
        scope: RUN_TIME
        value: ${emp-db.DATABASE}
      - key: JWT_ACCESS_SECRET
        scope: RUN_TIME
        type: SECRET
        value: change-me-long-secret
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: https://PLACEHOLDER-client.ondigitalocean.app,https://PLACEHOLDER-admin.ondigitalocean.app
      - key: APP_PUBLIC_URL
        scope: RUN_TIME
        value: https://PLACEHOLDER-client.ondigitalocean.app
      - key: SERVER_PUBLIC_URL
        scope: RUN_TIME
        value: ${APP_URL}

  - name: chatbot
    environment_slug: python
    github:
      repo: levanvutru358/totnghiep
      branch: main
      deploy_on_push: true
    source_dir: chatbot
    build_command: pip install -r requirements.txt
    run_command: uvicorn main:app --host 0.0.0.0 --port 8080
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    envs:
      - key: DB_HOST
        scope: RUN_TIME
        value: ${emp-db.HOSTNAME}
      - key: DB_PORT
        scope: RUN_TIME
        value: ${emp-db.PORT}
      - key: DB_USER
        scope: RUN_TIME
        value: ${emp-db.USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: ${emp-db.PASSWORD}
      - key: DB_NAME
        scope: RUN_TIME
        value: ${emp-db.DATABASE}
      - key: JWT_ACCESS_SECRET
        scope: RUN_TIME
        type: SECRET
        value: change-me-long-secret
      - key: CHATBOT_REQUIRE_AUTH
        scope: RUN_TIME
        value: "true"
      - key: GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: your-gemini-key
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: https://PLACEHOLDER-client.ondigitalocean.app
      - key: SHOP_URL
        scope: RUN_TIME
        value: https://PLACEHOLDER-client.ondigitalocean.app
      - key: LOCAL_STORE_PATH
        scope: RUN_TIME
        value: data/chatbot.db

static_sites:
  - name: emp-client
    environment_slug: node-js
    github:
      repo: levanvutru358/totnghiep
      branch: main
      deploy_on_push: true
    source_dir: emp.client
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: https://PLACEHOLDER-api.ondigitalocean.app/api
      - key: VITE_CHATBOT_URL
        scope: BUILD_TIME
        value: https://PLACEHOLDER-chatbot.ondigitalocean.app

  - name: emp-admin
    environment_slug: node-js
    github:
      repo: levanvutru358/totnghiep
      branch: main
      deploy_on_push: true
    source_dir: emp.admin
    build_command: npm install && npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: https://PLACEHOLDER-api.ondigitalocean.app/api
